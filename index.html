<html>
<head>

}

	color     : #FFFFFF;
	background: #006CBE;
	width     : 100;
	height    : 50;
}

	background: #0078D4;
}
textarea {
	background: #4A4A4A;

<table>

 type='button'

</td>

</tr>
</table><p></p>
